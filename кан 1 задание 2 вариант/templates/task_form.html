{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3>{{ 'Редактировать задачу' if task else 'Новая задача' }}</h3>
                <p class="text-muted mb-0">Проект: {{ project.name }}</p>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Название *</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ task.name if task else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Описание</label>
                        <textarea class="form-control" id="description" name="description" rows="4">{{ task.description if task else '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="status" class="form-label">Статус</label>
                        <select class="form-select" id="status" name="status">
                            {% for status in TaskStatus %}
                            <option value="{{ status.name }}" {% if task and task.status == status %}selected{% endif %}>
                                {{ status.value }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="priority" class="form-label">Приоритет</label>
                        <select class="form-select" id="priority" name="priority">
                            {% for priority in TaskPriority %}
                            <option value="{{ priority.name }}" {% if task and task.priority == priority %}selected{% endif %}>
                                {{ priority.value }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="assignee" class="form-label">Исполнитель*</label>
                        <input type="text" class="form-control" id="assignee" name="assignee" value="{{ task.assignee if task else '' }}" required>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('project.view_project', project_id=project.id) }}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
